<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>a question</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --ink: #1A0F1F;
    --ink-2: #241531;
    --rose: #FF6B8A;
    --rose-soft: #ff8da4;
    --gold: #FFD27D;
    --cream: #FBF4EC;
    --mauve: #9c7ea0;
    --line: rgba(251,244,236,0.14);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}

  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background: radial-gradient(120% 120% at 50% 0%, var(--ink-2) 0%, var(--ink) 60%);
    color: var(--cream);
    font-family:'Inter', sans-serif;
    overflow:hidden;
    overscroll-behavior: none;
  }

  #app{
    position:relative;
    width:100vw; height:100vh;
    height: 100dvh;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ambient floating particles */
  .ambient{
    position:absolute; inset:0; pointer-events:none; z-index:0;
  }
  .mote{
    position:absolute; bottom:-5%;
    width:6px; height:6px; border-radius:50%;
    background: var(--rose);
    opacity:0.35;
    filter: blur(0.5px);
    animation: float-up linear infinite;
  }
  @keyframes float-up{
    0%{ transform: translateY(0) translateX(0) scale(1); opacity:0; }
    10%{ opacity:0.5; }
    90%{ opacity:0.3; }
    100%{ transform: translateY(-110vh) translateX(var(--drift, 20px)) scale(0.6); opacity:0; }
  }

  .screen{
    position:relative;
    z-index:2;
    width:100%;
    max-width:520px;
    padding: 32px 24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    opacity:0;
    transform: translateY(14px) scale(0.985);
    pointer-events:none;
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(.2,.8,.2,1);
  }
  .screen.active{
    opacity:1;
    transform: translateY(0) scale(1);
    pointer-events:auto;
  }

  .eyebrow{
    font-size:13px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color: var(--mauve);
    margin-bottom:18px;
    font-weight:600;
    text-align:center;
    width:100%;
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-optical-sizing: auto;
    font-size: clamp(32px, 8vw, 50px);
    line-height:1.12;
    margin: 0 0 14px 0;
    letter-spacing:-0.01em;
    text-align:center;
    width:100%;
  }
  h1 .accent{
    font-style:italic;
    font-weight:600;
    color: var(--rose-soft);
  }

  p.sub{
    font-size:16px;
    line-height:1.6;
    color: var(--cream);
    opacity:0.7;
    max-width: 380px;
    margin: 0 auto 36px auto;
    font-weight:400;
    text-align:center;
  }

  .btn{
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:16px;
    padding: 16px 38px;
    border-radius: 100px;
    border: none;
    cursor:pointer;
    background: linear-gradient(135deg, var(--rose) 0%, #ff4d73 100%);
    color: var(--cream);
    box-shadow: 0 8px 30px rgba(255,107,138,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: transform 0.25s cubic-bezier(.2,.8,.2,1), box-shadow 0.25s ease;
    letter-spacing:0.01em;
  }
  .btn:hover{ transform: translateY(-2px) scale(1.03); box-shadow: 0 12px 36px rgba(255,107,138,0.45); }
  .btn:active{ transform: translateY(0) scale(0.97); }

  .btn-ghost{
    background: transparent;
    border: 1.5px solid var(--line);
    color: var(--cream);
    box-shadow:none;
  }
  .btn-ghost:hover{ border-color: var(--rose-soft); box-shadow: 0 0 0 4px rgba(255,107,138,0.08); }

  /* question screen */
  .qmark{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:15px;
    color: var(--gold);
    opacity:0.85;
    margin-bottom: 8px;
    letter-spacing:0.04em;
    text-align:center;
    width:100%;
  }

  .btn-row{
    position:relative;
    width:100%;
    height: 220px;
    margin-top: 8px;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    gap:18px;
  }

  #yesBtn{
    position:relative;
    z-index:3;
    font-size: clamp(16px, 4.2vw, 18px);
    padding: 17px 44px;
    transition: transform 0.25s cubic-bezier(.2,.8,.2,1), box-shadow 0.25s ease, font-size 0.35s ease, padding 0.35s ease;
  }

  #noBtn{
    position:absolute;
    z-index:4;
    font-size: 16px;
    padding: 16px 38px;
    background: rgba(251,244,236,0.06);
    border: 1.5px solid var(--line);
    color: var(--cream);
    opacity:0.85;
    transition: top 0.12s cubic-bezier(.22,1,.36,1), left 0.12s cubic-bezier(.22,1,.36,1), transform 0.1s ease;
    touch-action: none;
    user-select:none;
  }

  .hint{
    margin-top: 18px;
    font-size:13px;
    color: var(--mauve);
    min-height:18px;
    transition: opacity 0.3s ease;
  }

  /* success screen */
  .success-icon{
    font-size: 54px;
    margin-bottom: 18px;
    animation: pop-in 0.6s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop-in{
    0%{ transform: scale(0); opacity:0; }
    60%{ transform: scale(1.15); opacity:1; }
    100%{ transform: scale(1); }
  }

  .quote{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:15px;
    color:var(--gold);
    opacity:0.9;
    margin: 26px auto 0 auto;
    max-width:340px;
    line-height:1.5;
    text-align:center;
  }

  /* confetti + hearts burst */
  .burst-layer{
    position:fixed; inset:0; z-index:10; pointer-events:none; overflow:hidden;
  }
  .confetto, .heart-piece{
    position:absolute;
    top:-5%;
    will-change: transform, opacity;
    animation: confetti-fall linear forwards;
  }
  .confetto{ width:8px; height:14px; border-radius:2px; }
  .heart-piece{ font-size:20px; }
  @keyframes confetti-fall{
    0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity:1; }
    100%{ transform: translateY(112vh) translateX(var(--driftx,0px)) rotate(var(--spin,360deg)); opacity:0; }
  }

  footer.tag{
    position:absolute;
    bottom: 22px;
    left:0; right:0;
    text-align:center;
    font-size:11px;
    letter-spacing:0.1em;
    color: var(--mauve);
    opacity:0.45;
    z-index:2;
    text-transform:uppercase;
  }

  /* music toggle */
  #musicToggle{
    position:absolute;
    top: calc(18px + env(safe-area-inset-top));
    right: calc(18px + env(safe-area-inset-right));
    z-index: 20;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: rgba(251,244,236,0.06);
    color: var(--cream);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size: 18px;
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    backdrop-filter: blur(6px);
  }
  #musicToggle:hover{ transform: scale(1.08); border-color: var(--rose-soft); }
  #musicToggle:active{ transform: scale(0.94); }
  #musicToggle .icon-muted{ display:none; }
  #musicToggle.muted .icon-on{ display:none; }
  #musicToggle.muted .icon-muted{ display:inline; }

  @media (prefers-reduced-motion: reduce){
    .mote, .confetto, .heart-piece, .success-icon{ animation: none !important; }
    .screen{ transition: opacity 0.2s ease; }
  }

  /* ---------- phone-width screens ---------- */
  @media (max-width: 480px){
    .screen{ padding: 24px 18px; }
    .eyebrow{ font-size: 12px; margin-bottom: 14px; }
    h1{ font-size: clamp(28px, 9vw, 38px); }
    p.sub{ font-size: 15px; margin-bottom: 28px; }
    .btn{ padding: 15px 32px; font-size: 15px; }
    #yesBtn{ padding: 16px 38px; }
    #noBtn{ padding: 14px 30px; font-size: 15px; }
    .btn-row{ height: 240px; }
    footer.tag{ font-size: 10px; bottom: calc(14px + env(safe-area-inset-bottom)); }
    #musicToggle{ width: 40px; height: 40px; font-size: 16px; }
  }

  /* ---------- very small phones ---------- */
  @media (max-width: 360px){
    h1{ font-size: clamp(26px, 9.5vw, 34px); }
    .btn-row{ height: 260px; }
    .btn{ padding: 14px 26px; font-size: 14px; }
  }

  /* ---------- short / landscape phone screens ---------- */
  @media (max-height: 620px){
    .screen{ padding: 16px 20px; }
    .eyebrow{ margin-bottom: 10px; }
    h1{ font-size: clamp(24px, 7vw, 34px); margin-bottom: 8px; }
    p.sub{ margin-bottom: 18px; }
    .btn-row{ height: 170px; }
    footer.tag{ display:none; }
  }

  /* ---------- larger phones / small tablets, comfortable spacing ---------- */
  @media (min-width: 481px) and (max-width: 768px){
    .btn-row{ height: 230px; }
  }
</style>
</head>
<body>

<div id="app">
  <button id="musicToggle" aria-label="Toggle music" title="Toggle music">
    <span class="icon-on">♪</span>
    <span class="icon-muted">✕</span>
  </button>
  <div class="ambient" id="ambient"></div>

  <!-- Screen 1: Welcome -->
  <section class="screen active" id="screen-welcome">
    <div class="eyebrow">a small thing, for you</div>
    <h1>Welcome <span class="accent">❤</span></h1>
    <p class="sub">I've been meaning to ask you something. It's nothing big — just something I've been thinking about.</p>
    <button class="btn" id="proceedBtn">Proceed</button>
  </section>

  <!-- Screen 2: Question -->
  <section class="screen" id="screen-question">
    <div class="qmark">just one question</div>
    <h1>Do you<br><span class="accent">like</span> me?</h1>
    <div class="btn-row" id="btnRow">
      <button class="btn" id="yesBtn">Yes</button>
      <button class="btn btn-ghost" id="noBtn">No</button>
    </div>
    <div class="hint" id="hint"></div>
  </section>

  <!-- Screen 3: Success -->
  <section class="screen" id="screen-success">
    <div class="success-icon">🥰</div>
    <h1>I like you<br><span class="accent">too</span> ❤️</h1>
    <p class="sub" id="successSub">Honestly — I was a little nervous typing that question. Glad I did.</p>
    <div class="quote" id="quote"></div>
  </section>

  <footer class="tag">made with a little bit of nerve</footer>
</div>

<script>
(function(){
  "use strict";

  var screens = {
    welcome: document.getElementById('screen-welcome'),
    question: document.getElementById('screen-question'),
    success: document.getElementById('screen-success')
  };
  var current = 'welcome';

  function goTo(name){
    screens[current].classList.remove('active');
    current = name;
    screens[current].classList.add('active');
    if(name === 'success'){ onSuccess(); }
  }

  /* ---------- ambient floating motes ---------- */
  function spawnMotes(){
    var ambient = document.getElementById('ambient');
    var count = window.innerWidth < 480 ? 14 : 22;
    for(var i=0;i<count;i++){
      var m = document.createElement('div');
      m.className = 'mote';
      var size = 3 + Math.random()*5;
      m.style.width = size+'px';
      m.style.height = size+'px';
      m.style.left = Math.random()*100 + '%';
      m.style.setProperty('--drift', (Math.random()*60-30)+'px');
      var dur = 9 + Math.random()*10;
      m.style.animationDuration = dur+'s';
      m.style.animationDelay = (Math.random()*dur)+'s';
      if(Math.random() > 0.5){ m.style.background = 'var(--gold)'; }
      ambient.appendChild(m);
    }
  }
  spawnMotes();

  /* ---------- proceed ---------- */
  document.getElementById('proceedBtn').addEventListener('click', function(){
    goTo('question');
  });

  /* ---------- dodging No button ---------- */
  var noBtn = document.getElementById('noBtn');
  var yesBtn = document.getElementById('yesBtn');
  var btnRow = document.getElementById('btnRow');
  var hint = document.getElementById('hint');
  var dodgeCount = 0;

  var hints = [
    "huh, that's odd.",
    "it slipped away again!",
    "almost... not quite.",
    "it really doesn't want to be picked.",
    "okay this is just funny now.",
    "you can keep trying 🙂",
    "it has a mind of its own.",
    "good luck with that one."
  ];

  function placeNoButtonRandomly(fleeFromX, fleeFromY){
    var rowRect = btnRow.getBoundingClientRect();
    var noRect = noBtn.getBoundingClientRect();
    var yesRect = yesBtn.getBoundingClientRect();
    var btnW = noRect.width || noBtn.offsetWidth || 130;
    var btnH = noRect.height || noBtn.offsetHeight || 52;

    var padding = 4;
    var minLeft = padding;
    var maxLeft = Math.max(minLeft, rowRect.width - btnW - padding);
    var minTop = padding;
    var maxTop = Math.max(minTop, rowRect.height - btnH - padding);

    // Keep a safety margin around Yes (in row-local coordinates) so No can
    // never land on top of, or touching, the Yes button.
    var margin = 14;
    var yesLeft = yesRect.left - rowRect.left - margin;
    var yesTop = yesRect.top - rowRect.top - margin;
    var yesRight = yesRect.right - rowRect.left + margin;
    var yesBottom = yesRect.bottom - rowRect.top + margin;

    var left, top, attempts = 0, best = null, bestDist = -1;
    var candidates = 8;

    do {
      for(var c = 0; c < candidates; c++){
        var tryLeft, tryTop;

        if(typeof fleeFromX === 'number'){
          // Bias candidates toward the side of the row farthest from the
          // cursor/finger, so the button deliberately runs away rather than
          // landing anywhere at random.
          var rowCenterX = rowRect.left + rowRect.width/2;
          var rowCenterY = rowRect.top + rowRect.height/2;
          var awayX = rowCenterX - fleeFromX; // positive => cursor is left of center, flee right
          var awayY = rowCenterY - fleeFromY;
          var mag = Math.hypot(awayX, awayY) || 1;
          var dirX = awayX / mag;
          var dirY = awayY / mag;

          // bias point: push toward the far side, then jitter around it
          var biasLeft = (minLeft + maxLeft) / 2 + dirX * (maxLeft - minLeft) / 2;
          var biasTop = (minTop + maxTop) / 2 + dirY * (maxTop - minTop) / 2;
          var jitterX = (Math.random() - 0.5) * (maxLeft - minLeft) * 0.5;
          var jitterY = (Math.random() - 0.5) * (maxTop - minTop) * 0.5;

          tryLeft = Math.min(maxLeft, Math.max(minLeft, biasLeft + jitterX));
          tryTop = Math.min(maxTop, Math.max(minTop, biasTop + jitterY));
        } else {
          tryLeft = minLeft + Math.random() * (maxLeft - minLeft);
          tryTop = minTop + Math.random() * (maxTop - minTop);
        }

        var overlapsYes = tryLeft < yesRight && tryLeft + btnW > yesLeft &&
                           tryTop < yesBottom && tryTop + btnH > yesTop;
        if(overlapsYes) continue;

        if(typeof fleeFromX === 'number'){
          var candCenterX = rowRect.left + tryLeft + btnW/2;
          var candCenterY = rowRect.top + tryTop + btnH/2;
          var d = Math.hypot(candCenterX - fleeFromX, candCenterY - fleeFromY);
          if(d > bestDist){ bestDist = d; best = {left: tryLeft, top: tryTop}; }
        } else {
          best = {left: tryLeft, top: tryTop};
          break;
        }
      }
      attempts++;
    } while (!best && attempts < 12);

    if(!best){ best = {left: minLeft, top: minTop}; }

    noBtn.style.left = best.left + 'px';
    noBtn.style.top = best.top + 'px';
  }

  function dodge(fleeX, fleeY){
    dodgeCount++;
    placeNoButtonRandomly(fleeX, fleeY);

    // playful feedback
    if(dodgeCount % 3 === 0 && dodgeCount <= 24){
      hint.textContent = hints[Math.min(Math.floor(dodgeCount/3)-1, hints.length-1)];
    }

    // yes button grows slightly more inviting as No is chased, capped
    var growth = Math.min(dodgeCount * 0.45, 8);
    yesBtn.style.transform = 'scale(' + (1 + growth/100) + ')';
  }

  // initial placement once layout is ready
  window.addEventListener('load', function(){
    requestAnimationFrame(function(){
      // start centered-ish next to Yes, then it begins dodging on interaction
    });
  });

  // Desktop: dodge on hover/mousemove proximity + on click attempt
  noBtn.addEventListener('mouseenter', function(e){ dodge(e.clientX, e.clientY); });
  noBtn.addEventListener('mousemove', function(e){ dodge(e.clientX, e.clientY); });
  noBtn.addEventListener('click', function(e){
    e.preventDefault();
    dodge(e.clientX, e.clientY);
  });

  // Touch: dodge before any tap can register, on touchstart
  noBtn.addEventListener('touchstart', function(e){
    e.preventDefault();
    var t = e.touches[0];
    dodge(t ? t.clientX : undefined, t ? t.clientY : undefined);
  }, {passive:false});

  // Pointer-based proximity dodge — wide trigger radius so the button flees
  // well before the cursor/finger actually reaches it
  document.addEventListener('pointermove', function(e){
    if(current !== 'question') return;
    var r = noBtn.getBoundingClientRect();
    var cx = r.left + r.width/2;
    var cy = r.top + r.height/2;
    var dx = e.clientX - cx;
    var dy = e.clientY - cy;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var threshold = Math.max(r.width, r.height) * 1.8;
    if(dist < threshold){
      dodge(e.clientX, e.clientY);
    }
  });
  document.addEventListener('touchmove', function(e){
    if(current !== 'question') return;
    var t = e.touches[0];
    if(!t) return;
    var r = noBtn.getBoundingClientRect();
    var cx = r.left + r.width/2;
    var cy = r.top + r.height/2;
    var dx = t.clientX - cx;
    var dy = t.clientY - cy;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var threshold = Math.max(r.width, r.height) * 2.0;
    if(dist < threshold){
      e.preventDefault();
      dodge(t.clientX, t.clientY);
    }
  }, {passive:false});

  // Idle jukes: even without any interaction, the No button restlessly
  // repositions itself every couple of seconds while on the question screen
  setInterval(function(){
    if(current === 'question'){
      placeNoButtonRandomly();
    }
  }, 1800);

  /* ---------- Yes click ---------- */
  yesBtn.addEventListener('click', function(){
    goTo('success');
  });

  /* ---------- success screen: confetti + hearts + quote ---------- */
  var quotes = [
    "Some questions are worth the nerves it takes to ask them.",
    "Glad I hit send. Gladder you said yes.",
    "That went better than I rehearsed it in my head.",
    "Worth every second of overthinking this."
  ];

  var successFired = false;
  function onSuccess(){
    if(successFired) return;
    successFired = true;

    document.getElementById('quote').textContent =
      quotes[Math.floor(Math.random()*quotes.length)];

    burst();
    setTimeout(burst, 450);
  }

  function burst(){
    var layer = document.createElement('div');
    layer.className = 'burst-layer';
    document.body.appendChild(layer);

    var colors = ['#FF6B8A', '#FFD27D', '#FBF4EC', '#ff8da4'];
    var heartEmojis = ['❤️','💕','✨','😊'];
    var pieces = window.innerWidth < 480 ? 40 : 70;

    for(var i=0;i<pieces;i++){
      var useHeart = Math.random() > 0.65;
      var el = document.createElement('div');
      el.className = useHeart ? 'heart-piece' : 'confetto';
      el.style.left = Math.random()*100 + '%';
      el.style.setProperty('--driftx', (Math.random()*160-80)+'px');
      el.style.setProperty('--spin', (Math.random()*720-360)+'deg');
      var dur = 2.6 + Math.random()*2.2;
      el.style.animationDuration = dur+'s';
      el.style.animationDelay = (Math.random()*0.6)+'s';

      if(useHeart){
        el.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
      } else {
        el.style.background = colors[Math.floor(Math.random()*colors.length)];
      }
      layer.appendChild(el);
    }

    setTimeout(function(){ layer.remove(); }, 5200);
  }

  /* ---------- gentle "are you sure you want to leave" guard ---------- */
  window.addEventListener('beforeunload', function(e){
    if(current !== 'success'){
      e.preventDefault();
      e.returnValue = '';
      return '';
    }
  });

  /* ---------- original sweet & romantic theme (Web Audio API, no audio file needed) ---------- */
  var audioCtx = null;
  var masterGain = null;
  var compressor = null;
  var musicStarted = false;
  var musicMuted = false;
  var musicTimer = null;
  var MUSIC_VOLUME = 0.7; // loud, full, unmistakably present — the centerpiece, not background

  // An original romantic phrase in F major, built as a real singable
  // melodic hook (question -> answer -> ache -> warm resolution), with a
  // richer underlying harmony (root + fifth + octave doubling) so the pad
  // reads as a fuller "orchestral strings" wash rather than a thin triad.
  var progression = [
    { // F — the hook opens, reaching up and landing on the "sweet" 6th
      bass: 87.31,
      chord: [174.61, 220.00, 261.63, 349.23],
      melody: [
        { f: 349.23, len: 0.55 }, // F5
        { f: 392.00, len: 0.55 }, // G5
        { f: 440.00, len: 0.5  }, // A5
        { f: 523.25, len: 1.3  }, // C6 — the reach, held and shining
        { f: 440.00, len: 0.7  }  // A5
      ]
    },
    { // C — answers the hook, even sweeter, climbs a little higher
      bass: 130.81,
      chord: [196.00, 246.94, 329.63, 392.00],
      melody: [
        { f: 392.00, len: 0.5  },
        { f: 440.00, len: 0.5  },
        { f: 493.88, len: 0.5  },
        { f: 587.33, len: 1.4  }, // D6 — the sweetest, highest point of the phrase
        { f: 493.88, len: 0.7  }
      ]
    },
    { // Dm — a tender, aching dip before resolving home
      bass: 73.42,
      chord: [146.83, 174.61, 220.00, 293.66],
      melody: [
        { f: 440.00, len: 0.6  },
        { f: 415.30, len: 0.55 }, // brief leaning tone, a little ache
        { f: 392.00, len: 0.6  },
        { f: 349.23, len: 1.2  },
        { f: 392.00, len: 0.7  }
      ]
    },
    { // Bb -> C, settling warmly back home onto F
      bass: 116.54,
      chord: [233.08, 277.18, 349.23, 440.00],
      melody: [
        { f: 349.23, len: 0.55 },
        { f: 329.63, len: 0.55 },
        { f: 293.66, len: 0.5  },
        { f: 261.63, len: 1.4  }, // settles, full and resolved
        { f: 349.23, len: 0.7  }
      ]
    }
  ];
  var progIndex = 0;

  function ensureAudioCtx(){
    if(!audioCtx){
      var AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return null;
      audioCtx = new AC();

      // gentle limiter so the louder mix never clips or turns harsh
      compressor = audioCtx.createDynamicsCompressor();
      compressor.threshold.value = -10;
      compressor.knee.value = 18;
      compressor.ratio.value = 4;
      compressor.attack.value = 0.005;
      compressor.release.value = 0.25;
      compressor.connect(audioCtx.destination);

      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.0;
      masterGain.connect(compressor);
    }
    return audioCtx;
  }

  // Warm pad: four detuned triangle voices across root/fifth/third/octave,
  // slow swell, like a full string section underneath the melody.
  function playPad(freq, startTime, duration, vol){
    var detunes = [-6, -2, 2, 6];
    detunes.forEach(function(cents){
      var osc = audioCtx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      osc.detune.value = cents;

      var g = audioCtx.createGain();
      g.gain.setValueAtTime(0, startTime);
      g.gain.linearRampToValueAtTime(vol, startTime + 0.9);
      g.gain.linearRampToValueAtTime(vol * 0.85, startTime + duration * 0.7);
      g.gain.linearRampToValueAtTime(0, startTime + duration);

      osc.connect(g);
      g.connect(masterGain);
      osc.start(startTime);
      osc.stop(startTime + duration + 0.15);
    });
  }

  // Bass: sine + a touch of triangle for body — full, warm, and loud enough
  // to genuinely anchor the mix instead of sitting underneath it quietly.
  function playBass(freq, startTime, duration, vol){
    var osc = audioCtx.createOscillator();
    osc.type = 'sine';
    var osc2 = audioCtx.createOscillator();
    osc2.type = 'triangle';
    osc2.frequency.value = freq;
    var osc2Gain = audioCtx.createGain();
    osc2Gain.gain.value = 0.4;

    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0, startTime);
    g.gain.linearRampToValueAtTime(vol, startTime + 0.1);
    g.gain.linearRampToValueAtTime(vol * 0.88, startTime + duration * 0.6);
    g.gain.linearRampToValueAtTime(0, startTime + duration);
    osc.frequency.value = freq;

    osc.connect(g);
    osc2.connect(osc2Gain);
    osc2Gain.connect(g);
    g.connect(masterGain);

    osc.start(startTime);
    osc.stop(startTime + duration + 0.1);
    osc2.start(startTime);
    osc2.stop(startTime + duration + 0.1);
  }

  // Melody: a sweet, singing lead — sine core for tenderness, a brighter
  // sawtooth presence layer (louder than before) for real loudness, gentle
  // vibrato so held notes feel sung rather than mechanical, and a shimmer
  // octave on the longer "reach" notes for extra sweetness.
  function playMelody(freq, startTime, duration, vol){
    var osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;

    var vibrato = audioCtx.createOscillator();
    vibrato.type = 'sine';
    vibrato.frequency.value = 5.4;
    var vibratoGain = audioCtx.createGain();
    vibratoGain.gain.value = 5;
    vibrato.connect(vibratoGain);
    vibratoGain.connect(osc.frequency);

    var osc2 = audioCtx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.value = freq;
    var filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 2400;
    filter.Q.value = 0.6;
    var osc2Gain = audioCtx.createGain();
    osc2Gain.gain.value = 0.7;

    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0, startTime);
    g.gain.linearRampToValueAtTime(vol, startTime + 0.08);
    g.gain.linearRampToValueAtTime(vol * 0.82, startTime + duration * 0.65);
    g.gain.linearRampToValueAtTime(0, startTime + duration);

    osc.connect(g);
    osc2.connect(filter);
    filter.connect(osc2Gain);
    osc2Gain.connect(g);
    g.connect(masterGain);

    vibrato.start(startTime);
    vibrato.stop(startTime + duration + 0.05);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.05);
    osc2.start(startTime);
    osc2.stop(startTime + duration + 0.05);

    if(duration > 0.85){
      var shimmer = audioCtx.createOscillator();
      shimmer.type = 'sine';
      shimmer.frequency.value = freq * 2;
      var shimmerGain = audioCtx.createGain();
      shimmerGain.gain.setValueAtTime(0, startTime);
      shimmerGain.gain.linearRampToValueAtTime(vol * 0.22, startTime + 0.3);
      shimmerGain.gain.linearRampToValueAtTime(0, startTime + duration);
      shimmer.connect(shimmerGain);
      shimmerGain.connect(masterGain);
      shimmer.start(startTime);
      shimmer.stop(startTime + duration + 0.05);
    }
  }

  function scheduleBar(){
    if(!audioCtx || musicMuted) return;
    var now = audioCtx.currentTime;
    var bar = progression[progIndex % progression.length];
    progIndex++;

    var barDuration = 4.3;

    playBass(bar.bass, now, barDuration, 0.24);

    bar.chord.forEach(function(freq){
      playPad(freq, now, barDuration, 0.085);
    });

    var totalLen = bar.melody.reduce(function(sum, n){ return sum + n.len; }, 0);
    var scale = barDuration / totalLen;
    var t = now;
    bar.melody.forEach(function(note){
      var noteDuration = note.len * scale;
      playMelody(note.f, t, noteDuration * 0.94, 0.2);
      t += noteDuration;
    });

    musicTimer = setTimeout(scheduleBar, barDuration * 1000 * 0.97);
  }

  function startMusic(){
    var ctx = ensureAudioCtx();
    if(!ctx) return;
    if(ctx.state === 'suspended'){ ctx.resume(); }
    if(!musicStarted){
      musicStarted = true;
      masterGain.gain.setValueAtTime(masterGain.gain.value, ctx.currentTime);
      masterGain.gain.linearRampToValueAtTime(musicMuted ? 0 : MUSIC_VOLUME, ctx.currentTime + 1.0);
      scheduleBar();
    } else {
      masterGain.gain.cancelScheduledValues(ctx.currentTime);
      masterGain.gain.setValueAtTime(masterGain.gain.value, ctx.currentTime);
      masterGain.gain.linearRampToValueAtTime(musicMuted ? 0 : MUSIC_VOLUME, ctx.currentTime + 0.5);
    }
  }

  var musicToggle = document.getElementById('musicToggle');

  function setMuted(muted){
    musicMuted = muted;
    musicToggle.classList.toggle('muted', muted);
    if(audioCtx && masterGain){
      masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
      masterGain.gain.setValueAtTime(masterGain.gain.value, audioCtx.currentTime);
      masterGain.gain.linearRampToValueAtTime(muted ? 0 : MUSIC_VOLUME, audioCtx.currentTime + 0.4);
    }
  }

  musicToggle.addEventListener('click', function(){
    if(!musicStarted){
      startMusic();
      setMuted(false);
      return;
    }
    setMuted(!musicMuted);
  });

  // Browsers require a user gesture before audio can play — start
  // on the very first tap/click anywhere (e.g. the Proceed button).
  function firstGestureStart(){
    startMusic();
    document.removeEventListener('click', firstGestureStart);
    document.removeEventListener('touchstart', firstGestureStart);
  }
  document.addEventListener('click', firstGestureStart, {once:true});
  document.addEventListener('touchstart', firstGestureStart, {once:true});

})();
</script>
</body>
</html>
